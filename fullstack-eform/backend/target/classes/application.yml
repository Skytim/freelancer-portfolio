server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:eform;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

app:
  jwt:
    secret: eform-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
    expiration-ms: 86400000

logging:
  level:
    com.eform: DEBUG
