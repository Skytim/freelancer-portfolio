server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:erp;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
  servlet:
    multipart:
      max-file-size: 20MB

app:
  jwt:
    secret: erp-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
    expiration-ms: 86400000
